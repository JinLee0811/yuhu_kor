name: Supabase Keepalive

# Supabase 무료 티어는 7일간 활동이 없으면 프로젝트가 자동 일시정지됨.
# 매일 한 번 REST API에 GET 요청을 보내 활동 기록을 남겨 일시정지를 방지.

on:
  schedule:
    # 매일 09:00 UTC = 한국 18:00
    - cron: '0 9 * * *'
  workflow_dispatch: # 수동 실행도 가능

env:
  SUPABASE_URL: https://wbltdukxcwmnqdtvvtzz.supabase.co

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Supabase REST API 핑
        run: |
          response=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/entities?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "응답 코드: $response"
          echo "응답 본문: $(cat /tmp/body.txt | head -c 200)"
          if [ "$response" != "200" ]; then
            echo "::error::Supabase 핑 실패 (status $response)"
            exit 1
          fi
          echo "✅ Supabase 살아있음 — keepalive 성공"
